<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diferencia entre Fechas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #080c18; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; overflow-y: auto; padding: 20px;
  }
  #network { position: fixed; inset: 0; z-index: 0; }
  .glow {
    position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,136,255,.15) 0%, rgba(102,0,255,.08) 40%, transparent 70%);
    border-radius: 50%; z-index: 0;
  }
  .circuit-grid {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,136,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,136,255,.04) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: linear-gradient(to bottom, transparent 10%, #000 50%, #000 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 10%, #000 50%, #000 100%);
  }
  .circuit-grid::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,136,255,.06) 0, transparent 80px),
      radial-gradient(circle at 70% 60%, rgba(102,0,255,.06) 0, transparent 100px),
      radial-gradient(circle at 40% 80%, rgba(0,200,255,.04) 0, transparent 70px);
  }
  .card {
    position: relative; z-index: 2; width: 100%; max-width: 680px;
    background: rgba(8,12,28,.92);
    border: 1px solid rgba(0,136,255,.5);
    box-shadow: 0 0 30px rgba(0,136,255,.15), 0 0 60px rgba(102,0,255,.08), inset 0 0 30px rgba(0,136,255,.04);
    backdrop-filter: blur(2px);
  }
  .card-header {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-bottom: 1px solid rgba(0,136,255,.3); background: rgba(0,136,255,.04);
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .dot.r { background: #0088ff; box-shadow: 0 0 10px #0088ff; animation: pulse-dot 2s infinite; }
  .dot.y { background: #6600ff; box-shadow: 0 0 10px #6600ff; animation: pulse-dot 2s infinite .3s; }
  .dot.g { background: #00ccff; box-shadow: 0 0 10px #00ccff; animation: pulse-dot 2s infinite .6s; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .card-header .title {
    flex: 1; text-align: center; color: rgba(255,255,255,.45); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  }
  .back-btn, .header-btn {
    background: none; border: 1px solid rgba(0,136,255,.15); width: 34px; height: 34px;
    font-size: 14px; cursor: pointer; color: rgba(255,255,255,.75); transition: all .3s; text-decoration: none;
    display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace;
  }
  .back-btn:hover, .header-btn:hover {
    color: #00ccff; border-color: #00ccff; box-shadow: 0 0 20px rgba(0,204,255,.15); background: rgba(0,204,255,.05);
  }
  .card-body { padding: 32px 28px; }
  .field { margin-bottom: 24px; position: relative; }
  label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,.8); margin-bottom: 8px; letter-spacing: 1.5px; text-transform: uppercase;
  }
  label span { font-weight: 400; color: rgba(255,255,255,.65); }
  input[type="text"] {
    width: 100%; padding: 12px 14px; font-size: 16px; border: 1px solid rgba(0,136,255,.2); border-radius: 0;
    background: rgba(0,136,255,.05); color: rgba(255,255,255,.85); outline: none; font-family: 'JetBrains Mono', monospace;
    transition: border-color .2s, box-shadow .2s; cursor: pointer;
  }
  input[type="text"]:focus { border-color: #0088ff; box-shadow: 0 0 10px rgba(0,136,255,.2); }
  .error { color: #ff4444; font-size: 11px; margin-top: 6px; display: none; letter-spacing: 1px; }
  .calendar-popup {
    position: absolute; top: 100%; left: 0; z-index: 10; margin-top: 6px; width: 100%;
    background: rgba(8,12,28,.98); border: 1px solid rgba(0,136,255,.3); padding: 14px; display: none;
  }
  .calendar-popup.open { display: block; }
  .cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 6px; }
  .cal-head button {
    background: none; border: 1px solid rgba(0,136,255,.15); width: 30px; height: 30px;
    font-size: 14px; cursor: pointer; color: rgba(255,255,255,.65); transition: all .3s;
    display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace;
  }
  .cal-head button:hover { color: #00ccff; border-color: #00ccff; }
  .cal-selects { display: flex; gap: 6px; align-items: center; }
  .cal-selects select {
    padding: 4px 6px; font-size: 12px; font-weight: 600;
    border: 1px solid rgba(0,136,255,.2); background: rgba(0,136,255,.05); color: rgba(255,255,255,.8);
    cursor: pointer; outline: none; font-family: 'JetBrains Mono', monospace;
  }
  .cal-selects select:focus { border-color: #0088ff; }
  .cal-selects .cal-month { width: 120px; }
  .cal-selects .cal-year { width: 70px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow { text-align: center; font-size: 10px; font-weight: 600; color: rgba(255,255,255,.6); padding: 6px 0; text-transform: uppercase; letter-spacing: 1px; }
  .cal-day { text-align: center; padding: 7px 0; font-size: 14px; cursor: pointer; color: rgba(255,255,255,.75); transition: all .15s; }
  .cal-day:hover { background: rgba(0,136,255,.1); color: #fff; }
  .cal-day.selected { background: rgba(0,136,255,.2); color: #00ccff; box-shadow: inset 0 0 10px rgba(0,204,255,.1); }
  .cal-day.other { color: rgba(255,255,255,.4); }
  .cal-day.today { font-weight: 700; color: #0088ff; }
  .results { border: 1px solid rgba(0,136,255,.1); background: rgba(0,136,255,.03); padding: 20px; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
  .row + .row { border-top: 1px solid rgba(0,136,255,.06); }
  .row .label { color: rgba(255,255,255,.75); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .row .value { font-weight: 600; color: rgba(255,255,255,.9); text-align: right; }
  .row.highlight .value { color: #00ccff; font-size: 20px; text-shadow: 0 0 12px #00ccff; }
  .disclaimer { font-size: 11px; color: rgba(255,255,255,.65); margin-top: 16px; text-align: center; line-height: 1.5; letter-spacing: .5px; }
  .status-bar { padding: 8px 16px; border-top: 1px solid rgba(0,136,255,.3); display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,.55); letter-spacing: 1px; background: rgba(0,136,255,.03); }
  .status-bar .ok { color: #00ccff; text-shadow: 0 0 6px #00ccff; }
  @media (max-width: 600px) {
    body { padding: 12px; }
    .card-body { padding: 20px 16px; }
    .back-btn, .header-btn { width: 30px; height: 30px; font-size: 12px; }
    label { font-size: 11px; }
    input[type="text"] { padding: 10px 12px; font-size: 15px; }
    .row { font-size: 13px; }
    .row .label { font-size: 10px; }
    .row.highlight .value { font-size: 17px; }
    .results { padding: 14px; }
    .calendar-popup { padding: 10px; }
    .cal-head button { width: 26px; height: 26px; font-size: 12px; }
    .cal-selects select { font-size: 11px; }
    .cal-selects .cal-month { width: 100px; }
    .cal-selects .cal-year { width: 60px; }
    .cal-day { font-size: 12px; padding: 5px 0; }
    .cal-dow { font-size: 9px; }
  }
</style>
</head>
<body>
<canvas id="network"></canvas>
<div class="glow"></div>
<div class="circuit-grid"></div>

<div class="card">
  <div class="card-header">
    <div class="header-left">
      <a class="back-btn" href="index.html" aria-label="Volver">←</a>
      <span class="dot r"></span>
      <span class="dot y"></span>
      <span class="dot g"></span>
    </div>
    <span class="title">date::difference</span>
    <div class="header-right">
      <button id="langToggle" class="header-btn" aria-label="Cambiar idioma">ES</button>
    </div>
  </div>
  <div class="card-body">

    <div class="field">
      <label><span data-i18n="startDate">Fecha de inicio</span> <span data-i18n="dateFormat">DD/MM/AAAA</span></label>
      <input type="text" id="date1" placeholder="DD/MM/AAAA" autocomplete="off" spellcheck="false" inputmode="none">
      <div class="error" id="error1" data-i18n="invalidDate">Fecha no válida</div>
      <div class="calendar-popup" id="cal1">
        <div class="cal-head">
          <button class="cal-prev" type="button">‹</button>
          <div class="cal-selects">
            <select class="cal-month"></select>
            <select class="cal-year"></select>
          </div>
          <button class="cal-next" type="button">›</button>
        </div>
        <div class="cal-grid"></div>
      </div>
    </div>

    <div class="field">
      <label><span data-i18n="endDate">Fecha de fin</span> <span data-i18n="dateFormat">DD/MM/AAAA</span></label>
      <input type="text" id="date2" placeholder="DD/MM/AAAA" autocomplete="off" spellcheck="false" inputmode="none">
      <div class="error" id="error2" data-i18n="invalidDate">Fecha no válida</div>
      <div class="calendar-popup" id="cal2">
        <div class="cal-head">
          <button class="cal-prev" type="button">‹</button>
          <div class="cal-selects">
            <select class="cal-month"></select>
            <select class="cal-year"></select>
          </div>
          <button class="cal-next" type="button">›</button>
        </div>
        <div class="cal-grid"></div>
      </div>
    </div>

    <div class="results">
      <div class="row highlight">
        <span class="label" data-i18n="diffDays">Días de diferencia</span>
        <span class="value" id="diffDays">--</span>
      </div>
      <div class="row">
        <span class="label" data-i18n="diffMonths">Meses de diferencia</span>
        <span class="value" id="diffMonths">--</span>
      </div>
      <div class="row">
        <span class="label" data-i18n="diffYears">Años de diferencia</span>
        <span class="value" id="diffYears">--</span>
      </div>
      <div class="row">
        <span class="label" data-i18n="dayOfWeekStart">Día de la semana (inicio)</span>
        <span class="value" id="dayOfWeek1">--</span>
      </div>
      <div class="row">
        <span class="label" data-i18n="dayOfWeekEnd">Día de la semana (fin)</span>
        <span class="value" id="dayOfWeek2">--</span>
      </div>
    </div>

    <div class="disclaimer" data-i18n="disclaimer">
      Todos los cálculos tienen en cuenta años bisiestos.
    </div>
  </div>
  <div class="status-bar">
    <span class="ok">&#9679; epoch.online</span>
    <span>gregorian</span>
    <span>UTC</span>
  </div>
</div>

<script>
  const i18n = {
    es: {
      startDate: 'Fecha de inicio', endDate: 'Fecha de fin', dateFormat: 'DD/MM/AAAA',
      invalidDate: 'Fecha no válida', diffDays: 'Días de diferencia', diffMonths: 'Meses de diferencia',
      diffYears: 'Años de diferencia', dayOfWeekStart: 'Día de la semana (inicio)',
      dayOfWeekEnd: 'Día de la semana (fin)',
      disclaimer: 'Todos los cálculos tienen en cuenta años bisiestos.',
      yearsAbbr: 'a', monthsAbbr: 'm', daysAbbr: 'd',
    },
    en: {
      startDate: 'Start Date', endDate: 'End Date', dateFormat: 'DD/MM/YYYY',
      invalidDate: 'Invalid date', diffDays: 'Days Difference', diffMonths: 'Months Difference',
      diffYears: 'Years Difference', dayOfWeekStart: 'Day of Week (Start)',
      dayOfWeekEnd: 'Day of Week (End)',
      disclaimer: 'All calculations account for leap years.',
      yearsAbbr: 'y', monthsAbbr: 'm', daysAbbr: 'd',
    },
  };

  let lang = localStorage.getItem('lang') || 'es';
  function t(key) { return (i18n[lang] && i18n[lang][key]) || i18n['es'][key] || key; }
  function getLocale() { return lang === 'es' ? 'es-ES' : 'en-US'; }

  function applyLang() {
    document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
    document.querySelectorAll('.calendar-popup.open').forEach(p => p.classList.remove('open'));
    langToggle.textContent = lang === 'es' ? 'EN' : 'ES'; calc();
  }

  const date1El = document.getElementById('date1');
  const date2El = document.getElementById('date2');
  const error1 = document.getElementById('error1');
  const error2 = document.getElementById('error2');
  const diffDays = document.getElementById('diffDays');
  const diffMonths = document.getElementById('diffMonths');
  const diffYears = document.getElementById('diffYears');
  const dayOfWeek1 = document.getElementById('dayOfWeek1');
  const dayOfWeek2 = document.getElementById('dayOfWeek2');

  function parseDate(str) {
    const m = str.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (!m) return null;
    const d = new Date(+m[3], +m[2] - 1, +m[1]);
    if (d.getDate() !== +m[1] || d.getMonth() !== +m[2] - 1) return null;
    return d;
  }

  function fmtDate(d) {
    return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
  }

  function calc() {
    const d1 = parseDate(date1El.value);
    const d2 = parseDate(date2El.value);
    if (!d1) { error1.style.display = 'block'; date1El.style.borderColor = '#ff4444'; }
    else { error1.style.display = 'none'; date1El.style.borderColor = ''; }
    if (!d2) { error2.style.display = 'block'; date2El.style.borderColor = '#ff4444'; }
    else { error2.style.display = 'none'; date2El.style.borderColor = ''; }
    if (!d1 || !d2) {
      diffDays.textContent = diffMonths.textContent = diffYears.textContent = dayOfWeek1.textContent = dayOfWeek2.textContent = '--';
      return;
    }
    const ms = Math.abs(d2 - d1);
    const days = Math.round(ms / (1000 * 60 * 60 * 24));
    const start = new Date(Math.min(d1, d2));
    const end = new Date(Math.max(d1, d2));
    let y = end.getFullYear() - start.getFullYear();
    let m = end.getMonth() - start.getMonth();
    let d = end.getDate() - start.getDate();
    if (d < 0) { m--; const prev = new Date(end.getFullYear(), end.getMonth(), 0); d += prev.getDate(); }
    if (m < 0) { y--; m += 12; }
    const totalMonths = y * 12 + m;
    const opts = { weekday: 'long' };
    diffDays.textContent = days.toLocaleString(getLocale());
    diffMonths.textContent = totalMonths.toLocaleString(getLocale());
    diffYears.textContent = y + t('yearsAbbr') + ' ' + m + t('monthsAbbr') + ' ' + d + t('daysAbbr');
    dayOfWeek1.textContent = d1.toLocaleDateString(getLocale(), opts).charAt(0).toUpperCase() + d1.toLocaleDateString(getLocale(), opts).slice(1);
    dayOfWeek2.textContent = d2.toLocaleDateString(getLocale(), opts).charAt(0).toUpperCase() + d2.toLocaleDateString(getLocale(), opts).slice(1);
  }

  const today = new Date();
  const past = new Date(today);
  past.setDate(today.getDate() - 90);
  date1El.value = fmtDate(past);
  date2El.value = fmtDate(today);

  [date1El, date2El].forEach(el => el.addEventListener('input', calc));
  calc();

  function setupCalendar(inputEl, popupEl) {
    let viewDate = new Date();
    let selectedDate = null;
    let isOpen = false;

    function render() {
      const year = viewDate.getFullYear(), month = viewDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const startOffset = (firstDay + 6) % 7;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrev = new Date(year, month, 0).getDate();
      const today = new Date();

      const monthNames = [];
      for (let i = 0; i < 12; i++) monthNames.push(new Date(2000, i, 1).toLocaleDateString(getLocale(), { month: 'long' }));

      const monthSel = popupEl.querySelector('.cal-month');
      const yearSel = popupEl.querySelector('.cal-year');
      monthSel.innerHTML = monthNames.map((name, i) => '<option value="' + i + '"' + (i === month ? ' selected' : '') + '>' + name.charAt(0).toUpperCase() + name.slice(1) + '</option>').join('');
      if (monthSel.value !== String(month)) monthSel.value = month;
      yearSel.innerHTML = '';
      for (let y = year - 150; y <= year + 150; y++) { const opt = document.createElement('option'); opt.value = y; opt.textContent = y; if (y === year) opt.selected = true; yearSel.appendChild(opt); }
      if (yearSel.value !== String(year)) yearSel.value = year;

      const weekdays = getLocale() === 'es-ES' ? ['Lu','Ma','Mi','Ju','Vi','Sa','Do'] : ['Mo','Tu','We','Th','Fr','Sa','Su'];
      let html = '<div class="cal-dow">' + weekdays.join('</div><div class="cal-dow">') + '</div>';

      for (let i = startOffset - 1; i >= 0; i--) {
        const day = daysInPrev - i;
        const ym = new Date(year, month - 1);
        html += '<div class="cal-day other" data-y="' + ym.getFullYear() + '" data-m="' + ym.getMonth() + '" data-d="' + day + '">' + day + '</div>';
      }
      for (let day = 1; day <= daysInMonth; day++) {
        const cls = ['cal-day'];
        if (selectedDate && day === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear()) cls.push('selected');
        if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) cls.push('today');
        html += '<div class="' + cls.join(' ') + '" data-y="' + year + '" data-m="' + month + '" data-d="' + day + '">' + day + '</div>';
      }
      const total = startOffset + daysInMonth;
      const remaining = (7 - total % 7) % 7;
      for (let day = 1; day <= remaining; day++) {
        const ym = new Date(year, month + 1);
        html += '<div class="cal-day other" data-y="' + ym.getFullYear() + '" data-m="' + ym.getMonth() + '" data-d="' + day + '">' + day + '</div>';
      }
      popupEl.querySelector('.cal-grid').innerHTML = html;
      popupEl.querySelectorAll('.cal-day').forEach(el => {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          const y = parseInt(this.dataset.y), m = parseInt(this.dataset.m), d = parseInt(this.dataset.d);
          const date = new Date(y, m, d);
          inputEl.value = fmtDate(date);
          selectedDate = date;
          close();
          inputEl.dispatchEvent(new Event('input', { bubbles: true }));
        });
      });
    }

    function open() {
      const parsed = parseDate(inputEl.value);
      if (parsed) { selectedDate = parsed; viewDate = new Date(parsed.getFullYear(), parsed.getMonth(), 1); }
      else { selectedDate = null; viewDate = new Date(); viewDate.setDate(1); }
      render();
      popupEl.classList.add('open');
      isOpen = true;
    }

    function close() { popupEl.classList.remove('open'); isOpen = false; }

    inputEl.addEventListener('focus', function() {
      document.querySelectorAll('.calendar-popup.open').forEach(p => { if (p !== popupEl) p.classList.remove('open'); });
      open();
    });

    popupEl.querySelector('.cal-prev').addEventListener('click', function(e) { e.stopPropagation(); viewDate.setMonth(viewDate.getMonth() - 1); render(); });
    popupEl.querySelector('.cal-next').addEventListener('click', function(e) { e.stopPropagation(); viewDate.setMonth(viewDate.getMonth() + 1); render(); });
    popupEl.querySelector('.cal-month').addEventListener('change', function(e) { e.stopPropagation(); viewDate.setMonth(parseInt(this.value)); render(); });
    popupEl.querySelector('.cal-year').addEventListener('change', function(e) { e.stopPropagation(); viewDate.setFullYear(parseInt(this.value)); render(); });

    document.addEventListener('click', function(e) {
      if (isOpen && !popupEl.contains(e.target) && e.target !== inputEl) close();
    });
  }

  setupCalendar(date1El, document.getElementById('cal1'));
  setupCalendar(date2El, document.getElementById('cal2'));

  const langToggle = document.getElementById('langToggle');
  langToggle.addEventListener('click', () => { lang = lang === 'es' ? 'en' : 'es'; localStorage.setItem('lang', lang); applyLang(); });
  applyLang();

  const canvas = document.getElementById('network');
  const ctx = canvas.getContext('2d');
  let nodes = [];
  let mouse = { x: 0, y: 0 };
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initNodes(); }
  function initNodes() {
    nodes = [];
    const count = Math.floor((canvas.width * canvas.height) / 25000);
    for (let i = 0; i < count; i++) { nodes.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - .5) * .3, vy: (Math.random() - .5) * .3, r: Math.random() * 2 + 1 }); }
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  function draw() {
    ctx.fillStyle = 'rgba(8, 12, 28, .15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i]; n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
      if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
      const dx = mouse.x - n.x; const dy = mouse.y - n.y; const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150) { n.x -= dx * .005; n.y -= dy * .005; }
      for (let j = i + 1; j < nodes.length; j++) {
        const m = nodes[j]; const dx = n.x - m.x; const dy = n.y - m.y; const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.strokeStyle = `rgba(0, 136, 255, ${(1 - dist / 120) * .3})`;
          ctx.lineWidth = .5; ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(m.x, m.y); ctx.stroke();
        }
      }
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0, 136, 255, ${n.r / 3})`; ctx.shadowColor = '#0088ff'; ctx.shadowBlur = 6; ctx.fill(); ctx.shadowBlur = 0;
    }
  }
  setInterval(draw, 30);
</script>
