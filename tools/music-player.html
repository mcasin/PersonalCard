<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiptune Player — Marc Casin Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #080c18; font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden; overflow-y: auto; padding: 20px;
  }
  #network { position: fixed; inset: 0; z-index: 0; }
  .glow {
    position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,136,255,.15) 0%, rgba(102,0,255,.08) 40%, transparent 70%);
    border-radius: 50%; z-index: 0;
  }
  .circuit-grid {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,136,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,136,255,.04) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: linear-gradient(to bottom, transparent 10%, #000 50%, #000 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 10%, #000 50%, #000 100%);
  }
  .circuit-grid::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,136,255,.06) 0, transparent 80px),
      radial-gradient(circle at 70% 60%, rgba(102,0,255,.06) 0, transparent 100px),
      radial-gradient(circle at 40% 80%, rgba(0,200,255,.04) 0, transparent 70px);
  }
  .card {
    position: relative; z-index: 2; width: 100%; max-width: 540px;
    background: rgba(8,12,28,.93);
    border: 1px solid rgba(0,136,255,.5);
    box-shadow: 0 0 30px rgba(0,136,255,.15), 0 0 60px rgba(102,0,255,.08), inset 0 0 30px rgba(0,136,255,.04);
    backdrop-filter: blur(2px);
  }
  .card-header {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-bottom: 1px solid rgba(0,136,255,.3); background: rgba(0,136,255,.04);
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .dot.r { background: #0088ff; box-shadow: 0 0 10px #0088ff; animation: pulse-dot 2s infinite; }
  .dot.y { background: #6600ff; box-shadow: 0 0 10px #6600ff; animation: pulse-dot 2s infinite .3s; }
  .dot.g { background: #00ccff; box-shadow: 0 0 10px #00ccff; animation: pulse-dot 2s infinite .6s; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
  .card-header .title {
    flex: 1; text-align: center; color: rgba(255,255,255,.45);
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  }
  .back-btn {
    background: none; border: 1px solid rgba(0,136,255,.15); width: 34px; height: 34px;
    font-size: 14px; cursor: pointer; color: rgba(255,255,255,.75); transition: all .3s;
    text-decoration: none; display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .back-btn:hover {
    color: #00ccff; border-color: #00ccff;
    box-shadow: 0 0 20px rgba(0,204,255,.15); background: rgba(0,204,255,.05);
  }
  .card-body { padding: 20px; }

  /* ── VISUALIZER ─────────────────────────────────── */
  #visualizer {
    width: 100%; height: 80px; display: block;
    border: 1px solid rgba(0,136,255,.12);
    background: rgba(0,0,0,.35);
    margin-bottom: 18px;
  }

  /* ── NOW PLAYING ────────────────────────────────── */
  .now-playing { display: flex; gap: 16px; margin-bottom: 18px; align-items: center; }
  .album-wrap {
    width: 96px; height: 96px; flex-shrink: 0; position: relative;
    border: 1px solid rgba(0,136,255,.2);
  }
  #albumCanvas { display: block; }
  .track-info { flex: 1; min-width: 0; }
  .track-title {
    font-size: 15px; font-weight: 800; color: #00ccff;
    text-shadow: 0 0 14px rgba(0,204,255,.5);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-artist {
    font-size: 10px; color: rgba(255,255,255,.4);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
  }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 9px; color: rgba(0,136,255,.7); border: 1px solid rgba(0,136,255,.2);
    padding: 2px 7px; letter-spacing: 1px; text-transform: uppercase;
  }
  .badge.hi { color: #00ccff; border-color: rgba(0,204,255,.4); text-shadow: 0 0 6px rgba(0,204,255,.35); }

  /* ── PROGRESS ───────────────────────────────────── */
  .progress-section { margin-bottom: 16px; }
  .progress-times {
    display: flex; justify-content: space-between;
    font-size: 10px; color: rgba(255,255,255,.3); letter-spacing: 1px; margin-bottom: 7px;
  }
  .progress-track {
    height: 5px; background: rgba(0,136,255,.07);
    border: 1px solid rgba(0,136,255,.12);
    position: relative; cursor: pointer; user-select: none;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #0055bb, #00ccff);
    box-shadow: 0 0 8px rgba(0,204,255,.5);
    pointer-events: none; position: relative;
  }
  .progress-fill::after {
    content: ''; position: absolute; right: -4px; top: -4px;
    width: 9px; height: 9px; background: #00ccff; border-radius: 50%;
    box-shadow: 0 0 9px #00ccff;
  }

  /* ── CONTROLS ───────────────────────────────────── */
  .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 14px;
  }
  .ctrl-btn {
    background: rgba(0,136,255,.03); border: 1px solid rgba(0,136,255,.14);
    color: rgba(255,255,255,.65); width: 40px; height: 40px; font-size: 15px;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .ctrl-btn:hover {
    color: #00ccff; border-color: #00ccff;
    box-shadow: 0 0 14px rgba(0,204,255,.15); background: rgba(0,204,255,.05);
  }
  .ctrl-btn.on {
    color: #00ccff; border-color: rgba(0,204,255,.4); background: rgba(0,204,255,.06);
  }
  .ctrl-btn.play-btn {
    width: 54px; height: 54px; font-size: 21px;
    background: linear-gradient(135deg, rgba(0,100,220,.12), rgba(0,204,255,.12));
    border-color: rgba(0,204,255,.55); color: #00ccff;
    box-shadow: 0 0 16px rgba(0,204,255,.12);
  }
  .ctrl-btn.play-btn:hover { box-shadow: 0 0 30px rgba(0,204,255,.3); }

  /* ── VOLUME ─────────────────────────────────────── */
  .volume-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .vol-icon { font-size: 13px; flex-shrink: 0; color: rgba(255,255,255,.38); width: 18px; text-align: center; }
  input[type=range].vol-slider {
    flex: 1; -webkit-appearance: none; appearance: none; height: 3px;
    background: rgba(0,136,255,.17); border: none; outline: none; cursor: pointer;
  }
  input[type=range].vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 0;
    background: #00ccff; box-shadow: 0 0 7px #00ccff; cursor: pointer;
  }
  input[type=range].vol-slider::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 0; border: none;
    background: #00ccff; box-shadow: 0 0 7px #00ccff; cursor: pointer;
  }
  .vol-val { font-size: 10px; color: rgba(255,255,255,.32); letter-spacing: 1px; min-width: 32px; text-align: right; }

  /* ── PLAYLIST ───────────────────────────────────── */
  .pl-header {
    font-size: 9px; color: rgba(255,255,255,.28); letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid rgba(0,136,255,.1);
    display: flex; justify-content: space-between;
  }
  .pl-item {
    display: flex; align-items: center; gap: 11px; padding: 10px 12px;
    border: 1px solid rgba(0,136,255,.07); cursor: pointer; transition: all .2s;
    margin-bottom: 4px; position: relative; overflow: hidden;
  }
  .pl-item::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,136,255,.07), transparent);
    transition: left .45s;
  }
  .pl-item:hover::before { left: 100%; }
  .pl-item:hover { border-color: rgba(0,136,255,.26); background: rgba(0,136,255,.03); }
  .pl-item.active { border-color: rgba(0,204,255,.32); background: rgba(0,204,255,.04); }
  .pl-item.active .pl-name { color: #00ccff; text-shadow: 0 0 8px rgba(0,204,255,.4); }

  .pl-num { font-size: 10px; color: rgba(255,255,255,.2); min-width: 14px; text-align: center; }
  .pl-item.active .pl-num { color: rgba(0,204,255,.7); }

  /* animated bars (shown when active + playing) */
  .pl-bars { display: none; gap: 2px; align-items: flex-end; height: 14px; flex-shrink: 0; width: 14px; }
  .pl-item.active.playing .pl-num  { display: none; }
  .pl-item.active.playing .pl-bars { display: flex; }
  .pl-bars span {
    flex: 1; background: #00ccff; box-shadow: 0 0 4px #00ccff;
    animation: eq .65s ease infinite;
    transform-origin: bottom;
  }
  .pl-bars span:nth-child(1){ animation-delay: 0s; }
  .pl-bars span:nth-child(2){ animation-delay: .22s; }
  .pl-bars span:nth-child(3){ animation-delay: .44s; }
  @keyframes eq { 0%,100%{transform:scaleY(.25)} 50%{transform:scaleY(1)} }

  .pl-info { flex: 1; min-width: 0; }
  .pl-name { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.8); letter-spacing: 1px; text-transform: uppercase; }
  .pl-meta { font-size: 9px; color: rgba(255,255,255,.32); letter-spacing: .5px; margin-top: 2px; }
  .pl-dur  { font-size: 10px; color: rgba(255,255,255,.25); letter-spacing: .5px; flex-shrink: 0; }

  /* track color accent dots */
  .pl-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ── LICENSE ────────────────────────────────────── */
  .license {
    font-size: 9px; color: rgba(255,255,255,.16); letter-spacing: .5px;
    text-align: center; margin-top: 14px; line-height: 1.8;
  }
  .license a { color: rgba(0,204,255,.32); text-decoration: none; }
  .license a:hover { color: rgba(0,204,255,.6); }

  /* ── STATUS BAR ─────────────────────────────────── */
  .status-bar {
    padding: 8px 16px; border-top: 1px solid rgba(0,136,255,.3);
    display: flex; justify-content: space-between; font-size: 11px;
    color: rgba(255,255,255,.4); letter-spacing: 1px; background: rgba(0,136,255,.03);
  }
  .status-bar .ok { color: #00ccff; text-shadow: 0 0 6px #00ccff; }

  @media (max-width: 580px) {
    body { padding: 10px; }
    .card-body { padding: 14px; }
    .album-wrap { width: 78px; height: 78px; }
    #albumCanvas { width: 78px !important; height: 78px !important; }
    .track-title { font-size: 13px; }
    .ctrl-btn { width: 34px; height: 34px; font-size: 13px; }
    .ctrl-btn.play-btn { width: 46px; height: 46px; font-size: 18px; }
    .controls { gap: 6px; }
  }
</style>
</head>

<script>
// ── BACKGROUND CANVAS ──────────────────────────────────────────────────────
(function() {
  const cv = document.getElementById('network'), cx = cv.getContext('2d');
  let nodes = [], mouse = { x: -999, y: -999 };
  function resize() {
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    nodes = [];
    const n = Math.floor(cv.width * cv.height / 25000);
    for (let i = 0; i < n; i++)
      nodes.push({ x: Math.random()*cv.width, y: Math.random()*cv.height,
        vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3, r: Math.random()*2+1 });
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  (function draw() {
    cx.fillStyle = 'rgba(8,12,28,.15)'; cx.fillRect(0,0,cv.width,cv.height);
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      n.x += n.vx; n.y += n.vy;
      if (n.x<0||n.x>cv.width)  n.vx*=-1;
      if (n.y<0||n.y>cv.height) n.vy*=-1;
      const dx=mouse.x-n.x, dy=mouse.y-n.y, d=Math.sqrt(dx*dx+dy*dy);
      if (d<150) { n.x-=dx*.005; n.y-=dy*.005; }
      for (let j=i+1; j<nodes.length; j++) {
        const m=nodes[j], dx2=n.x-m.x, dy2=n.y-m.y, d2=Math.sqrt(dx2*dx2+dy2*dy2);
        if (d2<120) {
          cx.strokeStyle=`rgba(0,136,255,${(1-d2/120)*.3})`;
          cx.lineWidth=.5; cx.beginPath(); cx.moveTo(n.x,n.y); cx.lineTo(m.x,m.y); cx.stroke();
        }
      }
      cx.beginPath(); cx.arc(n.x,n.y,n.r,0,Math.PI*2);
      cx.fillStyle='rgba(0,136,255,.6)'; cx.fill();
    }
    requestAnimationFrame(draw);
  })();
})();

// ── TRACK CATALOGUE ────────────────────────────────────────────────────────
const SONGS = [
  {
    title:  'RETRO_ARCADE',
    artist: 'MONDAMUSIC',
    genre:  'ARCADE',
    rgb:    [0, 204, 255],
    file:   'music/mondamusic-retro-arcade-game-music-512837.mp3'
  },
  {
    title:  'DR_AKAGI',
    artist: 'ACIDICVOID',
    genre:  '8BIT·METAL',
    rgb:    [255, 85, 35],
    file:   'music/acidicvoid-dr-akagi-stage-intense-8-bit-metal-chiptune-202312.mp3'
  },
  {
    title:  'TECHNO_POLKA',
    artist: 'NICKPANEKAI',
    genre:  'TECHNO',
    rgb:    [170, 60, 255],
    file:   'music/nickpanekaiassets-chiptune-techno-polka-218042.mp3'
  },
  {
    title:  '80S_BATTLE',
    artist: 'NICKPANEKAI',
    genre:  '80S·CHIP',
    rgb:    [255, 210, 0],
    file:   'music/nickpanekaiassets-80s-video-game-battle-chiptune-216255.mp3'
  },
  {
    title:  'RED-E_8BIT',
    artist: 'NICKPANEKAI',
    genre:  'RETRO·RPG',
    rgb:    [0, 255, 130],
    file:   'music/nickpanekaiassets-red-e-8-bit-chiptune-for-retro-gaming-356128.mp3'
  }
];

// ── AUDIO PLAYER ──────────────────────────────────────────────────────────
class AudioPlayer {
  constructor() {
    this.audioCtx  = null;
    this.analyser  = null;
    this.gainNode  = null;
    this.source    = null;  // MediaElementSource (created once)
    this.el        = new Audio();
    this.el.preload = 'metadata';
    this.idx        = 0;
    this.isLooping  = false;
    this.isShuffled = false;
    this.vol        = 0.7;
    this._bindEvents();
  }

  _bindEvents() {
    this.el.addEventListener('ended',           () => { this.isLooping ? (this.el.currentTime=0, this.el.play()) : this.next(); });
    this.el.addEventListener('loadedmetadata',  () => refresh());
    this.el.addEventListener('play',            () => refresh());
    this.el.addEventListener('pause',           () => refresh());
    this.el.addEventListener('error',           e  => console.warn('Audio error', e));
  }

  _initCtx() {
    if (this.audioCtx) return;
    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    this.analyser = this.audioCtx.createAnalyser();
    this.analyser.fftSize = 1024;           // 512 bins — good frequency resolution
    this.analyser.smoothingTimeConstant = 0.82;
    this.gainNode = this.audioCtx.createGain();
    this.gainNode.gain.value = this.vol;
    this.source = this.audioCtx.createMediaElementSource(this.el);
    this.source.connect(this.analyser);
    this.analyser.connect(this.gainNode);
    this.gainNode.connect(this.audioCtx.destination);
  }

  get song()      { return SONGS[this.idx]; }
  get isPlaying() { return !this.el.paused; }
  get elapsed()   { const t = this.el.currentTime;  return isNaN(t) ? 0 : t; }
  get totalDur()  { const d = this.el.duration;     return isNaN(d) ? 0 : d; }

  load(i, play = true) {
    this.idx = ((i % SONGS.length) + SONGS.length) % SONGS.length;
    this.el.src = this.song.file;
    this.el.load();
    if (play) this.play();
    else refresh();
  }

  play() {
    this._initCtx();
    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    const p = this.el.play();
    if (p) p.catch(e => console.warn('Play blocked:', e));
  }

  pause() { this.el.pause(); }

  seek(frac) {
    if (this.totalDur) this.el.currentTime = Math.max(0, Math.min(1, frac)) * this.totalDur;
  }

  next() {
    this.load(this.isShuffled ? Math.floor(Math.random() * SONGS.length) : this.idx + 1);
  }

  prev() {
    if (this.elapsed > 3) this.seek(0);
    else this.load(this.idx - 1);
  }

  setVol(v) {
    this.vol = v;
    this.el.volume = v;
  }
}

// ── INSTANCE + ELEMENT SHORTCUTS ──────────────────────────────────────────
const P  = new AudioPlayer();
const $  = id => document.getElementById(id);
const btnPlay   = $('btnPlay'),   btnPrev   = $('btnPrev'),
      btnNext   = $('btnNext'),   btnLoop   = $('btnLoop'),
      btnShuffle= $('btnShuffle');
const progressTrack = $('progressTrack'), progressFill = $('progressFill');
const timeElapsed   = $('timeElapsed'),   timeDuration  = $('timeDuration');
const trackTitle    = $('trackTitle'),    trackArtist   = $('trackArtist');
const badgeGenre    = $('badgeGenre'),    badgeSize     = $('badgeSize');
const volSlider     = $('volSlider'),     volVal        = $('volVal'),  volIcon = $('volIcon');
const statusState   = $('statusState'),   statusTrack   = $('statusTrack');
const playlistEl    = $('playlist');
const visCanvas     = $('visualizer');
const visCtx        = visCanvas.getContext('2d');
const albCanvas     = $('albumCanvas');
const albCtx        = albCanvas.getContext('2d');

function fmtTime(s) {
  s = Math.max(0, Math.floor(s));
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ── REFRESH UI ─────────────────────────────────────────────────────────────
function refresh() {
  const s = P.song;
  trackTitle.textContent   = s.title;
  trackArtist.textContent  = s.artist;
  badgeGenre.textContent   = s.genre;
  badgeSize.textContent    = `${P.idx+1} / ${SONGS.length}`;
  timeDuration.textContent = P.totalDur ? fmtTime(P.totalDur) : '--:--';
  statusTrack.textContent  = `${P.idx+1}/${SONGS.length} · ${s.title}`;
  btnPlay.textContent      = P.isPlaying ? '⏸' : '▶';
  btnLoop.classList.toggle('on',    P.isLooping);
  btnShuffle.classList.toggle('on', P.isShuffled);
  statusState.textContent  = P.isPlaying ? 'playing' : 'paused';
  document.querySelectorAll('.pl-item').forEach((el, i) => {
    el.classList.toggle('active',  i === P.idx);
    el.classList.toggle('playing', i === P.idx && P.isPlaying);
  });
}

// ── BUILD PLAYLIST ──────────────────────────────────────────────────────────
(function buildPlaylist() {
  SONGS.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'pl-item' + (i === 0 ? ' active' : '');
    el.innerHTML = `
      <div class="pl-num">${i+1}</div>
      <div class="pl-bars"><span></span><span></span><span></span></div>
      <div class="pl-dot" style="background:rgba(${s.rgb.join(',')},0.85);
        box-shadow:0 0 6px rgba(${s.rgb.join(',')},0.5)"></div>
      <div class="pl-info">
        <div class="pl-name">${s.title}</div>
        <div class="pl-meta">${s.artist} · ${s.genre}</div>
      </div>
      <span class="pl-dur" id="dur${i}">--:--</span>`;
    el.addEventListener('click', () => { P.load(i); refresh(); });
    playlistEl.appendChild(el);
    // load metadata to get duration
    const tmp = new Audio(s.file);
    tmp.preload = 'metadata';
    tmp.addEventListener('loadedmetadata', () => {
      const el = document.getElementById(`dur${i}`);
      if (el) el.textContent = fmtTime(tmp.duration);
    });
  });
})();

// ── CONTROLS ───────────────────────────────────────────────────────────────
btnPlay.addEventListener('click',    () => { P.isPlaying ? P.pause() : P.play(); refresh(); });
btnPrev.addEventListener('click',    () => P.prev());
btnNext.addEventListener('click',    () => P.next());
btnLoop.addEventListener('click',    () => { P.isLooping   = !P.isLooping;   refresh(); });
btnShuffle.addEventListener('click', () => { P.isShuffled  = !P.isShuffled;  refresh(); });

// Progress seeking
let seeking = false;
function doSeek(e) { P.seek((e.clientX - progressTrack.getBoundingClientRect().left) / progressTrack.offsetWidth); }
progressTrack.addEventListener('mousedown',  e => { seeking = true;  doSeek(e); });
window.addEventListener('mouseup',           ()=> { seeking = false; });
window.addEventListener('mousemove',         e => { if (seeking) doSeek(e); });
progressTrack.addEventListener('touchstart', e => doSeek(e.touches[0]), { passive: true });
progressTrack.addEventListener('touchmove',  e => doSeek(e.touches[0]), { passive: true });

// Volume
volSlider.addEventListener('input', () => {
  const v = volSlider.value / 100;
  P.setVol(v);
  volVal.textContent  = volSlider.value + '%';
  volIcon.textContent = v === 0 ? '🔇' : v < 0.35 ? '🔈' : v < 0.7 ? '🔉' : '🔊';
});

// Keyboard
window.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if      (e.code === 'Space')      { e.preventDefault(); btnPlay.click(); }
  else if (e.code === 'ArrowRight') P.next();
  else if (e.code === 'ArrowLeft')  P.prev();
  else if (e.code === 'ArrowUp')    { volSlider.value = Math.min(100, +volSlider.value + 5); volSlider.dispatchEvent(new Event('input')); }
  else if (e.code === 'ArrowDown')  { volSlider.value = Math.max(0,   +volSlider.value - 5); volSlider.dispatchEvent(new Event('input')); }
});

// ── VISUALIZER RESIZE ──────────────────────────────────────────────────────
function resizeVis() { visCanvas.width = visCanvas.offsetWidth; visCanvas.height = visCanvas.offsetHeight; }
resizeVis();
window.addEventListener('resize', resizeVis);

// ── PEAK DECAY for visualizer ─────────────────────────────────────────────
const PEAKS = new Float32Array(512).fill(0);
const PEAK_HOLD = 0.996;   // decay multiplier per frame

// ── DRAW VISUALIZER ────────────────────────────────────────────────────────
function drawVisualizer(freq) {
  const W = visCanvas.width, H = visCanvas.height;

  // dim previous frame (trail effect)
  visCtx.fillStyle = 'rgba(6,9,20,0.65)';
  visCtx.fillRect(0, 0, W, H);

  if (!freq || freq.length === 0) {
    visCtx.strokeStyle = 'rgba(0,136,255,0.12)';
    visCtx.lineWidth = 1;
    visCtx.beginPath(); visCtx.moveTo(0, H/2); visCtx.lineTo(W, H/2); visCtx.stroke();
    return;
  }

  // Only use the lower 40% of bins (the interesting audio range for chiptune)
  const BINS = Math.floor(freq.length * 0.4);
  const bw   = W / BINS;

  for (let i = 0; i < BINS; i++) {
    const v = freq[i] / 255;
    // update peak
    if (v >= PEAKS[i])   PEAKS[i] = v;
    else                 PEAKS[i] = Math.max(0, PEAKS[i] * PEAK_HOLD - 0.001);

    const bh  = v * H;
    const ph  = PEAKS[i] * H;
    const x   = i * bw;

    // colour: bass=blue, mids=cyan, highs=white
    const hue = 195 + (i / BINS) * 50;
    const sat = 100 - (i / BINS) * 25;
    const lit = 55  + v * 25;

    // bar
    if (bh > 0.5) {
      const grad = visCtx.createLinearGradient(0, H - bh, 0, H);
      grad.addColorStop(0, `hsla(${hue},${sat}%,${lit}%,${0.55 + v*0.45})`);
      grad.addColorStop(1, `hsla(${hue},${sat}%,${lit*0.6}%,0.3)`);
      visCtx.fillStyle = grad;
      visCtx.fillRect(x, H - bh, Math.max(1, bw - 1), bh);
    }

    // peak dot
    if (ph > 1) {
      visCtx.fillStyle = `hsla(${hue},100%,80%,${Math.min(1, PEAKS[i] * 1.4)})`;
      visCtx.fillRect(x, H - ph - 1, Math.max(1, bw - 1), 2);
    }
  }

  // bottom reflection
  visCtx.save();
  visCtx.scale(1, -1); visCtx.translate(0, -H);
  visCtx.globalAlpha = 0.12;
  for (let i = 0; i < BINS; i++) {
    const v  = freq[i] / 255;
    const bh = v * H * 0.25;
    if (bh < 0.5) continue;
    visCtx.fillStyle = `rgba(0,180,255,${v})`;
    visCtx.fillRect(i * bw, H - bh, Math.max(1, bw-1), bh);
  }
  visCtx.restore();
  visCtx.globalAlpha = 1;
}

// ── DRAW ALBUM ART ─────────────────────────────────────────────────────────
function drawAlbumArt(freq) {
  const W = 96, H = 96, cx = W/2, cy = H/2;
  const [r, g, b] = P.song.rgb;
  const t = performance.now() / 1000;

  // energy bands from real audio
  let bass = 0, mid = 0, high = 0;
  if (freq && freq.length > 0) {
    const avg = (a, b2) => { let s=0; for(let i=a;i<=b2&&i<freq.length;i++) s+=freq[i]; return s/(b2-a+1)/255; };
    bass = avg(0, 5);
    mid  = avg(10, 40);
    high = avg(60, 120);
  } else {
    bass = (Math.sin(t*2)+1)*0.15;
    mid  = (Math.sin(t*3+1)+1)*0.1;
    high = (Math.sin(t*5+2)+1)*0.08;
  }

  albCtx.fillStyle = '#04070f';
  albCtx.fillRect(0, 0, W, H);

  // ── radial frequency ring (shared across all tracks)
  if (freq && freq.length > 0) {
    const BARS = 64;
    const innerR = 22, outerMax = 42;
    for (let i = 0; i < BARS; i++) {
      const bin   = Math.floor(i * freq.length * 0.35 / BARS);
      const v     = freq[bin] / 255;
      const angle = (i / BARS) * Math.PI * 2 - Math.PI / 2;
      const oR    = innerR + v * outerMax;
      const alpha = 0.35 + v * 0.65;
      const hue   = 195 + (i/BARS)*45 + P.idx*15;
      albCtx.strokeStyle = `hsla(${hue},100%,65%,${alpha})`;
      albCtx.lineWidth = 2;
      albCtx.beginPath();
      albCtx.moveTo(cx + Math.cos(angle)*innerR, cy + Math.sin(angle)*innerR);
      albCtx.lineTo(cx + Math.cos(angle)*oR,     cy + Math.sin(angle)*oR);
      albCtx.stroke();
    }
  }

  // ── per-track center art
  const i = P.idx;
  if (i === 0) {
    // RETRO_ARCADE: circuit cross + pulsing nodes
    const pulse = 0.5 + bass * 0.5;
    albCtx.strokeStyle = `rgba(${r},${g},${b},${0.4 + pulse*0.4})`; albCtx.lineWidth = 1.5;
    albCtx.beginPath(); albCtx.moveTo(4,cy); albCtx.lineTo(W-4,cy); albCtx.stroke();
    albCtx.beginPath(); albCtx.moveTo(cx,4); albCtx.lineTo(cx,H-4); albCtx.stroke();
    for (let n = 0; n < 5; n++) {
      const ang = (n/5)*Math.PI*2 + t*0.6;
      const nr  = 12 + bass*4;
      const nx  = cx + Math.cos(ang)*nr, ny = cy + Math.sin(ang)*nr;
      const a   = 0.4 + 0.5*Math.abs(Math.sin(t*3+n));
      albCtx.fillStyle = `rgba(${r},${g},${b},${a})`;
      albCtx.fillRect(nx-2.5, ny-2.5, 5, 5);
    }
  } else if (i === 1) {
    // DR_AKAGI: lightning bolts pulsing on bass hits
    const intensity = 0.4 + bass * 0.7;
    albCtx.strokeStyle = `rgba(${r},${g},${b},${intensity})`; albCtx.lineWidth = 1.5 + bass*2;
    const bolt = [
      [cx,4], [cx-8,cy-4], [cx+4,cy-4], [cx,cy+6], [cx+8,cy+6], [cx-4,H-4]
    ];
    albCtx.beginPath();
    bolt.forEach(([bx,by],n)=> n===0 ? albCtx.moveTo(bx,by) : albCtx.lineTo(bx,by));
    albCtx.stroke();
    // glow on kick
    if (bass > 0.5) {
      const grd = albCtx.createRadialGradient(cx,cy,0,cx,cy,20+bass*20);
      grd.addColorStop(0,`rgba(${r},${g},${b},${bass*0.5})`);
      grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
      albCtx.fillStyle = grd; albCtx.fillRect(0,0,W,H);
    }
  } else if (i === 2) {
    // TECHNO_POLKA: rotating concentric squares
    for (let n = 0; n < 4; n++) {
      const sz    = 8 + n*13;
      const angle = t*(n%2===0 ? 0.9:-0.7) + n*0.8 + mid*2;
      albCtx.save(); albCtx.translate(cx,cy); albCtx.rotate(angle);
      albCtx.strokeStyle = `rgba(${r},${g},${b},${0.75-n*0.12})`; albCtx.lineWidth = 1.4;
      albCtx.strokeRect(-sz/2,-sz/2,sz,sz);
      albCtx.restore();
    }
  } else if (i === 3) {
    // 80S_BATTLE: pixel explosion particles
    const speed = 1 + high * 3;
    for (let n = 0; n < 16; n++) {
      const ang = (n/16)*Math.PI*2;
      const dist= (12 + mid*18) * (0.6 + 0.4*Math.sin(t*speed + n));
      const px  = cx + Math.cos(ang)*dist;
      const py  = cy + Math.sin(ang)*dist;
      const sz  = 2 + bass * 3;
      albCtx.fillStyle = `rgba(${r},${g},${b},${0.5+0.5*Math.abs(Math.sin(t*4+n))})`;
      albCtx.fillRect(px-sz/2, py-sz/2, sz, sz);
    }
    // center star
    albCtx.fillStyle = `rgba(${r},${g},${b},${0.6+bass*0.4})`;
    const cs = 3 + bass*5;
    albCtx.fillRect(cx-cs/2, cy-cs/2, cs, cs);
  } else {
    // RED-E_8BIT: scrolling binary / matrix
    albCtx.font = '7px JetBrains Mono, monospace';
    albCtx.textAlign = 'center';
    const speed = 1.2 + mid * 2;
    for (let row = 0; row < 9; row++) {
      for (let col = 0; col < 7; col++) {
        const bit   = Math.round(Math.sin(row*3.9+col*2.3+t*speed)*0.5+0.5);
        const alpha = 0.12 + 0.8*Math.abs(Math.sin(row+col*1.5+t*(1+bass)));
        albCtx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        albCtx.fillText(bit?'1':'0', col*14+7, row*10+9);
      }
    }
  }

  // ── centre dot (bass pulse)
  const dotR = 3 + bass * 7;
  const grdC = albCtx.createRadialGradient(cx,cy,0,cx,cy,dotR);
  grdC.addColorStop(0, `rgba(${r},${g},${b},${0.7+bass*0.3})`);
  grdC.addColorStop(1, `rgba(${r},${g},${b},0)`);
  albCtx.fillStyle = grdC; albCtx.beginPath(); albCtx.arc(cx,cy,dotR,0,Math.PI*2); albCtx.fill();

  // ── scanline overlay
  albCtx.fillStyle = 'rgba(0,0,0,0.16)';
  for (let y = 0; y < H; y+=2) albCtx.fillRect(0,y,W,1);

  // ── animated border
  const glow = 0.32 + bass * 0.5;
  albCtx.strokeStyle = `rgba(${r},${g},${b},${glow})`; albCtx.lineWidth = 1;
  albCtx.strokeRect(0.5, 0.5, W-1, H-1);
}

// ── MAIN ANIMATION LOOP ────────────────────────────────────────────────────
let freqData = null;
function loop() {
  // grab frequency data once per frame
  if (P.analyser) {
    if (!freqData || freqData.length !== P.analyser.frequencyBinCount)
      freqData = new Uint8Array(P.analyser.frequencyBinCount);
    P.analyser.getByteFrequencyData(freqData);
  }

  drawVisualizer(freqData);
  drawAlbumArt(freqData);

  // progress bar
  const elapsed = P.elapsed, total = P.totalDur;
  const frac = total > 0 ? elapsed / total : 0;
  progressFill.style.width = (Math.min(frac, 1) * 100) + '%';
  timeElapsed.textContent  = fmtTime(elapsed);
  if (P.totalDur && !seeking) timeDuration.textContent = fmtTime(P.totalDur);

  // keep play button and playlist in sync
  btnPlay.textContent = P.isPlaying ? '⏸' : '▶';
  statusState.textContent = P.isPlaying ? 'playing' : 'paused';
  document.querySelectorAll('.pl-item').forEach((el, i) => {
    el.classList.toggle('active',  i === P.idx);
    el.classList.toggle('playing', i === P.idx && P.isPlaying);
  });

  requestAnimationFrame(loop);
}

// ── INIT ───────────────────────────────────────────────────────────────────
// Pre-select track 0 without autoplay (respect browser autoplay policy)
P.load(0, false);
refresh();
loop();
</script>
</body>
