<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversor de Unidades</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #080c18; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; overflow-y: auto; padding: 20px;
  }
  #network { position: fixed; inset: 0; z-index: 0; }
  .glow {
    position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,136,255,.15) 0%, rgba(102,0,255,.08) 40%, transparent 70%);
    border-radius: 50%; z-index: 0;
  }
  .circuit-grid {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,136,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,136,255,.04) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: linear-gradient(to bottom, transparent 10%, #000 50%, #000 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 10%, #000 50%, #000 100%);
  }
  .circuit-grid::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,136,255,.06) 0, transparent 80px),
      radial-gradient(circle at 70% 60%, rgba(102,0,255,.06) 0, transparent 100px),
      radial-gradient(circle at 40% 80%, rgba(0,200,255,.04) 0, transparent 70px);
  }
  .card {
    position: relative; z-index: 2; width: 100%; max-width: 680px;
    background: rgba(8,12,28,.92);
    border: 1px solid rgba(0,136,255,.5);
    box-shadow: 0 0 30px rgba(0,136,255,.15), 0 0 60px rgba(102,0,255,.08), inset 0 0 30px rgba(0,136,255,.04);
    backdrop-filter: blur(2px);
  }
  .card-header {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-bottom: 1px solid rgba(0,136,255,.3); background: rgba(0,136,255,.04);
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .dot.r { background: #0088ff; box-shadow: 0 0 10px #0088ff; animation: pulse-dot 2s infinite; }
  .dot.y { background: #6600ff; box-shadow: 0 0 10px #6600ff; animation: pulse-dot 2s infinite .3s; }
  .dot.g { background: #00ccff; box-shadow: 0 0 10px #00ccff; animation: pulse-dot 2s infinite .6s; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .card-header .title {
    flex: 1; text-align: center; color: rgba(255,255,255,.45); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  }
  .back-btn, .header-btn {
    background: none; border: 1px solid rgba(0,136,255,.15); width: 34px; height: 34px;
    font-size: 14px; cursor: pointer; color: rgba(255,255,255,.75); transition: all .3s; text-decoration: none;
    display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace;
  }
  .back-btn:hover, .header-btn:hover {
    color: #00ccff; border-color: #00ccff; box-shadow: 0 0 20px rgba(0,204,255,.15); background: rgba(0,204,255,.05);
  }
  .card-body { padding: 32px 28px; }
  .field { margin-bottom: 24px; }
  label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,.8); margin-bottom: 8px; letter-spacing: 1.5px; text-transform: uppercase;
  }
  label span { font-weight: 400; color: rgba(255,255,255,.65); }
  .btn-group { display: flex; gap: 8px; }
  .btn-group button {
    flex: 1; padding: 12px 8px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    border: 1px solid rgba(0,136,255,.15); background: transparent; color: rgba(255,255,255,.8);
    cursor: pointer; transition: all .3s; font-family: 'JetBrains Mono', monospace;
  }
  .btn-group button:hover { color: #00ccff; border-color: #00ccff; box-shadow: 0 0 20px rgba(0,204,255,.15); background: rgba(0,204,255,.05); }
  .btn-group button.active { color: #00ccff; border-color: #00ccff; box-shadow: 0 0 20px rgba(0,204,255,.15); background: rgba(0,204,255,.05); }
  .input-row { display: flex; gap: 10px; align-items: stretch; }
  .input-row input[type="number"] {
    flex: 1; padding: 12px 14px; font-size: 16px; border: 1px solid rgba(0,136,255,.2); border-radius: 0;
    background: rgba(0,136,255,.05); color: rgba(255,255,255,.85); outline: none; min-width: 0;
    font-family: 'JetBrains Mono', monospace; transition: border-color .2s, box-shadow .2s;
  }
  .input-row input[type="number"]:focus { border-color: #0088ff; box-shadow: 0 0 10px rgba(0,136,255,.2); }
  .input-row input[type="number"]::-webkit-inner-spin-button { opacity: .5; }
  select {
    padding: 12px 12px; font-size: 14px; border: 1px solid rgba(0,136,255,.2); border-radius: 0;
    background: rgba(0,136,255,.05); color: rgba(255,255,255,.8); outline: none; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; min-width: 120px; transition: border-color .2s, box-shadow .2s;
  }
  select:focus { border-color: #0088ff; box-shadow: 0 0 10px rgba(0,136,255,.2); }
  .results { border: 1px solid rgba(0,136,255,.1); background: rgba(0,136,255,.03); padding: 20px; margin-top: 24px; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
  .row + .row { border-top: 1px solid rgba(0,136,255,.06); }
  .row .label { color: rgba(255,255,255,.75); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .row .value { font-weight: 600; color: rgba(255,255,255,.9); text-align: right; }
  .row.highlight .value { color: #00ccff; font-size: 20px; text-shadow: 0 0 12px #00ccff; }
  .disclaimer { font-size: 11px; color: rgba(255,255,255,.65); margin-top: 16px; text-align: center; line-height: 1.5; letter-spacing: .5px; }
  .status-bar { padding: 8px 16px; border-top: 1px solid rgba(0,136,255,.3); display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,.55); letter-spacing: 1px; background: rgba(0,136,255,.03); }
  .status-bar .ok { color: #00ccff; text-shadow: 0 0 6px #00ccff; }
  @media (max-width: 600px) {
    body { padding: 12px; }
    .card-body { padding: 20px 16px; }
    .back-btn, .header-btn { width: 30px; height: 30px; font-size: 12px; }
    label { font-size: 11px; }
    .input-row { flex-direction: column; }
    .input-row input[type="number"] { padding: 10px 12px; font-size: 15px; }
    select { min-width: 100%; padding: 10px 10px; font-size: 13px; }
    .btn-group { flex-wrap: wrap; }
    .btn-group button { padding: 10px 6px; font-size: 10px; min-width: calc(50% - 4px); }
    .row { font-size: 13px; }
    .row .label { font-size: 10px; }
    .row.highlight .value { font-size: 17px; }
    .results { padding: 14px; }
  }
</style>
</head>
<body>
<canvas id="network"></canvas>
<div class="glow"></div>
<div class="circuit-grid"></div>

<div class="card">
  <div class="card-header">
    <div class="header-left">
      <a class="back-btn" href="index.html" aria-label="Volver">←</a>
      <span class="dot r"></span>
      <span class="dot y"></span>
      <span class="dot g"></span>
    </div>
    <span class="title">unit::converter</span>
    <div class="header-right">
      <button id="langToggle" class="header-btn" aria-label="Cambiar idioma">ES</button>
    </div>
  </div>
  <div class="card-body">

    <div class="field">
      <label data-i18n="category">Categoría</label>
      <div class="btn-group" id="category">
        <button type="button" data-cat="temp" class="active" data-i18n="catTemp">Temperatura</button>
        <button type="button" data-cat="weight" data-i18n="catWeight">Peso</button>
        <button type="button" data-cat="length" data-i18n="catLength">Longitud</button>
        <button type="button" data-cat="volume" data-i18n="catVolume">Volumen</button>
      </div>
    </div>

    <div class="field">
      <label data-i18n="value">Valor</label>
      <div class="input-row">
        <input type="number" id="value" value="100" step="any">
        <select id="unit"></select>
      </div>
    </div>

    <div class="results" id="results"></div>

    <div class="disclaimer" data-i18n="disclaimer">
      Los resultados se redondean a 4 decimales como máximo.
    </div>
  </div>
  <div class="status-bar">
    <span class="ok">&#9679; convert.ready</span>
    <span>SI</span>
    <span>imperial</span>
  </div>
</div>

<script>
  const i18n = {
    es: {
      category: 'Categoría', catTemp: 'Temperatura', catWeight: 'Peso', catLength: 'Longitud', catVolume: 'Volumen',
      value: 'Valor', numError: 'Introduzca un valor numérico',
      disclaimer: 'Los resultados se redondean a 4 decimales como máximo.',
      unitC: 'Celsius', unitF: 'Fahrenheit', unitK: 'Kelvin',
      unitKg: 'Kilogramo', unitG: 'Gramo', unitLb: 'Libra', unitOz: 'Onza', unitSt: 'Stone',
      unitKm: 'Kilómetro', unitM: 'Metro', unitCm: 'Centímetro', unitMm: 'Milímetro',
      unitMi: 'Milla', unitYd: 'Yarda', unitFt: 'Pie', unitIn: 'Pulgada',
      unitL: 'Litro', unitMl: 'Mililitro', unitM3: 'Metro cúbico',
      unitGal: 'Galón', unitQt: 'Cuarto', unitCup: 'Taza', unitFloz: 'Onza líquida',
    },
    en: {
      category: 'Category', catTemp: 'Temperature', catWeight: 'Weight', catLength: 'Length', catVolume: 'Volume',
      value: 'Value', numError: 'Enter a numeric value',
      disclaimer: 'Results are rounded to 4 decimal places maximum.',
      unitC: 'Celsius', unitF: 'Fahrenheit', unitK: 'Kelvin',
      unitKg: 'Kilogram', unitG: 'Gram', unitLb: 'Pound', unitOz: 'Ounce', unitSt: 'Stone',
      unitKm: 'Kilometer', unitM: 'Meter', unitCm: 'Centimeter', unitMm: 'Millimeter',
      unitMi: 'Mile', unitYd: 'Yard', unitFt: 'Foot', unitIn: 'Inch',
      unitL: 'Liter', unitMl: 'Milliliter', unitM3: 'Cubic meter',
      unitGal: 'Gallon', unitQt: 'Quart', unitCup: 'Cup', unitFloz: 'Fluid ounce',
    },
  };

  let lang = localStorage.getItem('lang') || 'es';
  function t(key) { return (i18n[lang] && i18n[lang][key]) || i18n['es'][key] || key; }
  function getLocale() { return lang === 'es' ? 'es-ES' : 'en-US'; }

  function applyLang() {
    document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
    langToggle.textContent = lang === 'es' ? 'EN' : 'ES';
    populateUnits(); calc();
  }

  const catBtns = document.querySelectorAll('#category button');
  const valueEl = document.getElementById('value');
  const unitEl = document.getElementById('unit');
  const resultsEl = document.getElementById('results');

  const units = {
    temp: {
      nameKey: 'catTemp',
      list: [
        { id: 'C', labelKey: 'unitC', base: v => v, from: v => v },
        { id: 'F', labelKey: 'unitF', base: v => (v - 32) * 5 / 9, from: v => v * 9 / 5 + 32 },
        { id: 'K', labelKey: 'unitK', base: v => v - 273.15, from: v => v + 273.15 },
      ],
    },
    weight: {
      nameKey: 'catWeight',
      list: [
        { id: 'kg', labelKey: 'unitKg', base: v => v, from: v => v },
        { id: 'g', labelKey: 'unitG', base: v => v / 1000, from: v => v * 1000 },
        { id: 'lb', labelKey: 'unitLb', base: v => v * 0.453592, from: v => v / 0.453592 },
        { id: 'oz', labelKey: 'unitOz', base: v => v * 0.0283495, from: v => v / 0.0283495 },
        { id: 'st', labelKey: 'unitSt', base: v => v * 6.35029, from: v => v / 6.35029 },
      ],
    },
    length: {
      nameKey: 'catLength',
      list: [
        { id: 'km', labelKey: 'unitKm', base: v => v * 1000, from: v => v / 1000 },
        { id: 'm', labelKey: 'unitM', base: v => v, from: v => v },
        { id: 'cm', labelKey: 'unitCm', base: v => v / 100, from: v => v * 100 },
        { id: 'mm', labelKey: 'unitMm', base: v => v / 1000, from: v => v * 1000 },
        { id: 'mi', labelKey: 'unitMi', base: v => v * 1609.34, from: v => v / 1609.34 },
        { id: 'yd', labelKey: 'unitYd', base: v => v * 0.9144, from: v => v / 0.9144 },
        { id: 'ft', labelKey: 'unitFt', base: v => v * 0.3048, from: v => v / 0.3048 },
        { id: 'in', labelKey: 'unitIn', base: v => v * 0.0254, from: v => v / 0.0254 },
      ],
    },
    volume: {
      nameKey: 'catVolume',
      list: [
        { id: 'L', labelKey: 'unitL', base: v => v, from: v => v },
        { id: 'mL', labelKey: 'unitMl', base: v => v / 1000, from: v => v * 1000 },
        { id: 'm3', labelKey: 'unitM3', base: v => v * 1000, from: v => v / 1000 },
        { id: 'gal', labelKey: 'unitGal', base: v => v * 3.78541, from: v => v / 3.78541 },
        { id: 'qt', labelKey: 'unitQt', base: v => v * 0.946353, from: v => v / 0.946353 },
        { id: 'cup', labelKey: 'unitCup', base: v => v * 0.236588, from: v => v / 0.236588 },
        { id: 'floz', labelKey: 'unitFloz', base: v => v * 0.0295735, from: v => v / 0.0295735 },
      ],
    },
  };

  let currentCat = 'temp';

  function populateUnits() {
    const cat = units[currentCat];
    unitEl.innerHTML = cat.list.map(u => '<option value="' + u.id + '">' + t(u.labelKey) + '</option>').join('');
  }

  function fmt(v) {
    if (v === Infinity || isNaN(v)) return '--';
    const trimmed = parseFloat(v.toFixed(4));
    return trimmed.toLocaleString(getLocale(), { minimumFractionDigits: 0, maximumFractionDigits: 4 });
  }

  function calc() {
    const val = parseFloat(valueEl.value);
    if (isNaN(val)) { resultsEl.innerHTML = '<div class="row"><span class="label">' + t('numError') + '</span></div>'; return; }
    const cat = units[currentCat];
    const fromUnit = cat.list.find(u => u.id === unitEl.value);
    if (!fromUnit) return;
    const baseVal = fromUnit.base(val);
    const rows = cat.list.map(u => {
      const converted = u.from(baseVal);
      const isSource = u.id === fromUnit.id;
      return '<div class="row' + (isSource ? ' highlight' : '') + '"><span class="label">' + t(u.labelKey) + '</span><span class="value">' + fmt(converted) + '</span></div>';
    });
    resultsEl.innerHTML = rows.join('');
  }

  catBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      catBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      populateUnits(); calc();
    });
  });

  unitEl.addEventListener('change', calc);
  valueEl.addEventListener('input', calc);
  populateUnits(); calc();

  const langToggle = document.getElementById('langToggle');
  langToggle.addEventListener('click', () => { lang = lang === 'es' ? 'en' : 'es'; localStorage.setItem('lang', lang); applyLang(); });
  applyLang();

  const canvas = document.getElementById('network');
  const ctx = canvas.getContext('2d');
  let nodes = [];
  let mouse = { x: 0, y: 0 };
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initNodes(); }
  function initNodes() {
    nodes = [];
    const count = Math.floor((canvas.width * canvas.height) / 25000);
    for (let i = 0; i < count; i++) { nodes.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - .5) * .3, vy: (Math.random() - .5) * .3, r: Math.random() * 2 + 1 }); }
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  function draw() {
    ctx.fillStyle = 'rgba(8, 12, 28, .15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i]; n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
      if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
      const dx = mouse.x - n.x; const dy = mouse.y - n.y; const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150) { n.x -= dx * .005; n.y -= dy * .005; }
      for (let j = i + 1; j < nodes.length; j++) {
        const m = nodes[j]; const dx = n.x - m.x; const dy = n.y - m.y; const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.strokeStyle = `rgba(0, 136, 255, ${(1 - dist / 120) * .3})`;
          ctx.lineWidth = .5; ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(m.x, m.y); ctx.stroke();
        }
      }
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0, 136, 255, ${n.r / 3})`; ctx.shadowColor = '#0088ff'; ctx.shadowBlur = 6; ctx.fill(); ctx.shadowBlur = 0;
    }
  }
  setInterval(draw, 30);
</script>
</body>
</html>
